<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Погода Онлайн</title>
    <!-- Favicon - красивая иконка для вкладки -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='grad' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%23667eea'/%3E%3Cstop offset='100%25' stop-color='%23764ba2'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='50' cy='50' r='45' fill='url(%23grad)'/%3E%3Ctext x='50' y='70' font-size='50' text-anchor='middle' fill='white'%3E🌤️%3C/text%3E%3C/svg%3E">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='grad' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%23667eea'/%3E%3Cstop offset='100%25' stop-color='%23764ba2'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='50' cy='50' r='45' fill='url(%23grad)'/%3E%3Ctext x='50' y='70' font-size='50' text-anchor='middle' fill='white'%3E🌤️%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="app-container">
        <div class="theme-toggle-container">
            <button id="themeToggle" class="theme-toggle-btn">🌙</button>
        </div>
        <div class="split-layout" id="splitLayout">
            <!-- Левая колонка: виджет местоположения -->
            <div class="column left-col">
                <div class="weather-widget" id="locationWidget">
                    <div class="widget-header">
                        <span class="widget-icon">📍</span>
                        <h3>Моё местоположение</h3>
                    </div>
                    <div class="widget-content" id="locationContent">
                        <div class="loading-container">
                            <div class="loading-spinner"></div>
                            <p>Определяем ваш город...</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Правая колонка: поиск + избранное + тема -->
            <div class="column right-col">
                <!-- Большой логотип над поиском -->
                <div class="logo-container">
                    <div class="main-logo">
                        <div class="logo-icon">🌤️</div>
                        <div class="logo-text">
                            <h1>Погода Онлайн</h1>
                            <p>Актуальный прогноз для любого города</p>
                        </div>
                    </div>
                </div>
                
                <div class="search-card">
                    <h2>🔍 Поиск города</h2>
                    <div class="input-group">
                        <input type="text" id="cityInput" placeholder="Например, Москва" lang="ru">
                        <button id="searchBtn">Найти</button>
                    </div>
                </div>

                <!-- Избранные города -->
                <div class="favorites-card">
                    <div class="favorites-header">
                        <span>⭐ Избранное</span>
                        <!-- кнопка темы удалена отсюда -->
                    </div>
                    <div class="favorites-list" id="favoritesList">
                        <p class="favorites-empty">Нет избранных городов</p>
                    </div>
                </div>
                <!-- Виджет для сайта -->
                <div class="embed-card">
                    <div class="favorites-header" style="justify-content: space-between;">
                        <span>📦 Виджет для сайта</span>
                    </div>
                    <div class="embed-controls">
                        <div class="embed-field">
                            <label>Город (оставьте пустым для автоопределения)</label>
                            <input type="text" id="widgetCity" placeholder="Например, Лондон">
                        </div>
                        <div class="embed-field">
                            <label>Тема</label>
                            <select id="widgetTheme">
                                <option value="light">Светлая</option>
                                <option value="dark">Тёмная</option>
                            </select>
                        </div>
                        <div class="embed-field">
                            <label>Размер</label>
                            <select id="widgetSize">
                                <option value="full">Полный (с прогнозом)</option>
                                <option value="compact">Компактный</option>
                            </select>
                        </div>
                        <button id="generateWidgetBtn" class="generate-btn">Сгенерировать код виджета</button>
                    </div>
                    <div id="widgetCodeContainer" style="display: none; margin-top: 20px;">
                        <label style="font-weight: 600;">Код для вставки на ваш сайт:</label>
                        <textarea id="widgetCode" rows="3" readonly style="width:100%; background: var(--detail-bg); border-radius:16px; padding:12px; margin-top:8px; font-family:monospace; font-size:12px;"></textarea>
                        <button id="copyWidgetCode" style="margin-top: 8px; background: #667eea; padding: 8px 16px;">Копировать</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Вид после поиска: полноэкранный виджет выбранного города -->
        <div class="full-layout" id="fullLayout" style="display: none;">
            <div class="weather-widget full-widget">
                <div class="widget-header">
                    <span class="widget-icon">🔍</span>
                    <h3 id="searchedCityTitle">Результат поиска</h3>
                    <button class="back-btn" id="backBtn">← Назад</button>
                </div>
                <div class="widget-content" id="fullContent">
                    <div class="loading-container">
                        <div class="loading-spinner"></div>
                        <p>Загрузка...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
